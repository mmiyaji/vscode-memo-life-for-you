name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Package extension
        run: npx @vscode/vsce package --out memo-life-for-you-admin-${{ github.ref_name }}.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## Memo Life For You Admin ${{ github.ref_name }}

            ### Install
            1. Download the `.vsix` file from this release.
            2. Open VS Code.
            3. Run `Extensions: Install from VSIX...` from the Command Palette.
            4. Select the downloaded `.vsix` file.
          files: memo-life-for-you-admin-${{ github.ref_name }}.vsix
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
